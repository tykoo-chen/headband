<script>
// ============== 状态 ==============
const state = {
  apiKey: localStorage.getItem('apiKey') || '',
  boardUrl: (localStorage.getItem('boardUrl') || '').replace(/\/$/, ''),
  alertEmail: localStorage.getItem('alertEmail') || '',
  chatHistory: JSON.parse(localStorage.getItem('chatHistory') || '[]'),
  rules: JSON.parse(localStorage.getItem('rules') || '[]'),
  planHistory: JSON.parse(localStorage.getItem('planHistory') || '[]'),
  events: JSON.parse(localStorage.getItem('events') || '[]'),
  games: JSON.parse(localStorage.getItem('games') || '[]'),
  feed: JSON.parse(localStorage.getItem('feed') || '[]'),
  mercyCards: parseInt(localStorage.getItem('mercyCards') || '0'),
  lifeBonus: parseFloat(localStorage.getItem('lifeBonus') || '0'),  // 累计多活分钟数
  myId: localStorage.getItem('myId') || '',
  myName: localStorage.getItem('myName') || '',
  editingRule: null,
};
if (!state.myId) {
  state.myId = 'U' + Math.random().toString(36).slice(2, 8).toUpperCase();
  localStorage.setItem('myId', state.myId);
}

// ===== 启动迁移：清掉历史 events 里的 base64 快照图（之前写入过的会撑爆 localStorage） =====
(function migrateEvents() {
  try {
    let changed = false;
    state.events = (state.events || []).map(e => {
      if (e && e.snapshot_image) { delete e.snapshot_image; changed = true; }
      if (e && typeof e.snapshot_text === 'string' && e.snapshot_text.length > 200) {
        e.snapshot_text = e.snapshot_text.slice(0, 200); changed = true;
      }
      return e;
    });
    if (state.events.length > 100) { state.events = state.events.slice(-100); changed = true; }
    if (changed) localStorage.setItem('events', JSON.stringify(state.events));
  } catch(_) {}
})();

// localStorage 容量安全写入：满了就裁剪 events/feed/planHistory 再重试
function safeSetItem(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch(e) {
    console.warn('localStorage quota, pruning...', key, e.message);
    try {
      if (state.events && state.events.length > 20) state.events = state.events.slice(-20);
      if (state.feed && state.feed.length > 20) state.feed = state.feed.slice(0, 20);
      if (state.planHistory && state.planHistory.length > 10) state.planHistory = state.planHistory.slice(-10);
      if (state.chatHistory && state.chatHistory.length > 10) state.chatHistory = state.chatHistory.slice(-10);
      localStorage.setItem('events', JSON.stringify(state.events || []));
      localStorage.setItem('feed', JSON.stringify(state.feed || []));
      localStorage.setItem('planHistory', JSON.stringify(state.planHistory || []));
      localStorage.setItem('chatHistory', JSON.stringify(state.chatHistory || []));
      localStorage.setItem(key, value);
    } catch(e2) {
      console.error('localStorage still full after prune', e2);
      alert('本地存储满了，已自动清理部分历史数据。如果还报错，请去设置里清空战绩。');
    }
  }
}

// PUNISHMENTS 动作库 —— 审计状态（2026-04-08）：
//   vibrate/buzzer/led  [占位] 仅 UI 标签，当前板子 server.py 无对应通道，命中后只做展示
//   bark                [需配置] 需要 Bark key，尚未实现
//   email               [占位] 旧 id，保留做 UI 兼容，推荐使用 email_alert
//   wecom/sms/social    [占位] 第三方 API 未接入
//   deduct/donate       [占位] 需要支付/托管通道，未实现
//   lock                [占位] 需要桌面端配合，浏览器无法真正锁屏
//   release             [占位] 质押机制未落地
//   voice_insult        [已实现] 板子 Kimi 生成羞辱词 → PWA 用 window.speechSynthesis 在 iPhone Safari 本地播报
//   email_alert         [已实现+需配置] 走板子 /email，需要在设置里填收件邮箱
// 带 action 字段的条目会在 runDetection 命中后被自动执行；其余仅做 UI 展示。
const PUNISHMENTS = [
  { id: 'vibrate',   icon: '📳', name: '发带震动',         desc: '硬件就绪后生效',     level: '🟢' },
  { id: 'buzzer',    icon: '🔔', name: '发带蜂鸣',         desc: '公共场合社死',       level: '🟢' },
  { id: 'led',       icon: '💡', name: 'LED 闪光',         desc: '强光视觉干扰',       level: '🟢' },
  { id: 'voice_insult', icon: '📢', name: '语音羞辱播报', desc: 'Kimi 生成羞辱词 → iPhone 自带 TTS 在本地播报', level: '🔴', needsConfig: false,
    action: async ({rule, reason}) => {
      if (!state.boardUrl) return;
      // 同一条规则 30 秒内只播一次，避免每 5 秒一次轮询都 speak 一遍导致排队堆积
      const now = Date.now();
      if (_lastSpokenAt[rule.id] && now - _lastSpokenAt[rule.id] < 30000) {
        console.log('voice_insult debounced for rule', rule.id);
        return;
      }
      _lastSpokenAt[rule.id] = now;

      // 先播一条默认句兜底，立刻有声；等 /speak 拿到 Kimi 的句子再覆盖
      speakInsult('别再违规了！');

      let line = '';
      try {
        const r = await fetch(state.boardUrl + '/speak', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({rule_name: rule.name, condition: rule.condition, reason}),
        });
        const data = await r.json();
        if (data.line) line = data.line;
      } catch(e) { console.warn('speak fetch failed', e); }
      if (line && line !== '别再违规了！') speakInsult(line);
    }
  },
  { id: 'email_alert', icon: '✉️', name: '邮件通报', desc: '向指定邮箱发送违规邮件', level: '🟠', needsConfig: true,
    action: async ({rule, reason, input}) => {
      if (!state.alertEmail || !state.boardUrl) return;
      try {
        await fetch(state.boardUrl + '/email', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({to: state.alertEmail, rule_name: rule.name, reason, snapshot_text: input.text}),
        });
      } catch(e) { console.warn('email failed', e); }
    }
  },
  { id: 'bark',      icon: '📱', name: '推送通知到自己',    desc: '通过 Bark / 通知',  level: '🟡', needsConfig: true },
  { id: 'email',     icon: '📧', name: '邮件提醒自己',     desc: '发到自己邮箱（旧占位，推荐用 email_alert）', level: '🟡', needsConfig: true },
  { id: 'wecom',    icon: '👥', name: '企微/钉钉群通报',   desc: '让群里人都知道',     level: '🟠', needsConfig: true },
  { id: 'sms',       icon: '📨', name: '短信发给监督人',    desc: '发给指定手机号',     level: '🟠', needsConfig: true },
  { id: 'social',    icon: '🌐', name: '自动发微博/朋友圈', desc: '公开打卡失败',       level: '🟠', needsConfig: true },
  { id: 'deduct',    icon: '💰', name: '扣钱（押金）',     desc: '从托管押金里扣',     level: '🔴', needsConfig: true },
  { id: 'donate',    icon: '🎁', name: '强制小额捐款',     desc: '捐给慈善机构',       level: '🔴', needsConfig: true },
  { id: 'lock',      icon: '🔒', name: '锁定电脑/暂停视频', desc: '强制中断当前活动',   level: '🔴', needsConfig: true },
  { id: 'release',   icon: '⚠️', name: '释放质押文件',     desc: '不可逆，慎选',       level: '🟣', needsConfig: true },
];

// ============== Tab ==============
function switchTab(name) {
  document.querySelectorAll('[data-page]').forEach(s => s.classList.add('hidden'));
  document.querySelector(`[data-page="${name}"]`).classList.remove('hidden');
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('tab-active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('tab-active');
  if (name === 'rules') renderRules();
  if (name === 'plan') renderPlanChat();
  if (name === 'monitor') { renderStats(); refreshBoardStatus(); }
  else { stopFrameStream(); }
  if (name === 'friends') renderFriends();
}

// ============== 战绩 ==============
function renderStats() {
  const box = document.getElementById('stats-content');
  if (!box) return;
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const events = state.events || [];
  const todayEvents = events.filter(e => e.ts >= todayStart);

  // 连续自律天数：从昨天往前数，哪天没有事件就继续，直到遇到有事件的一天
  let streak = 0;
  for (let i = 1; i <= 365; i++) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    const hasEvent = events.some(e => e.ts >= dayStart && e.ts < dayEnd);
    if (hasEvent) break;
    streak++;
  }
  // 今天如果没触发，也算 +1
  if (todayEvents.length === 0) streak++;

  // 最近 7 天每天统计
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    const count = events.filter(e => e.ts >= dayStart && e.ts < dayEnd).length;
    const label = i === 0 ? '今' : new Date(dayStart).getDate() + '';
    days.push({ label, count });
  }
  const maxCount = Math.max(1, ...days.map(d => d.count));

  // 按规则统计命中次数（总计）
  const perRule = {};
  events.forEach(e => {
    perRule[e.rule_name] = (perRule[e.rule_name] || 0) + 1;
  });
  const ruleStats = Object.entries(perRule).sort((a, b) => b[1] - a[1]).slice(0, 5);

  let html = `
    <div class="grid grid-cols-3 gap-2 mb-4" id="chart-7day-stats">
      <div class="nb-card p-3 text-center" style="background:#fdba74;">
        <div class="text-3xl font-black text-black">${todayEvents.length}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-black mt-1">今日触发</div>
      </div>
      <div class="nb-card p-3 text-center" style="background:#fbbf24;">
        <div class="text-3xl font-black text-black">${streak}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-black mt-1">连续自律</div>
      </div>
      <div class="nb-card p-3 text-center" style="background:#ffffff;">
        <div class="text-3xl font-black text-black">${events.length}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-black mt-1">累计触发</div>
      </div>
    </div>

    <div class="nb-card p-3 mb-4" id="chart-7day">
      <div class="text-sm font-black uppercase tracking-tight mb-3 text-black">📉 最近 7 天</div>
      <div class="flex items-end gap-1 h-24">
        ${days.map(d => `
          <div class="flex-1 flex flex-col items-center justify-end">
            <div class="text-[10px] font-black text-black">${d.count || ''}</div>
            <div class="w-full border-2 border-black" style="background:${d.count > 0 ? '#b91c1c' : '#fbbf24'}; height: ${(d.count / maxCount) * 80}%; min-height: 6px;"></div>
            <div class="text-[10px] font-black text-black mt-1">${d.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (ruleStats.length > 0) {
    html += `<div class="nb-card p-3 mb-4">
      <div class="text-sm font-black uppercase tracking-tight mb-2 text-black">🏆 最常违规</div>
      ${ruleStats.map(([name, count]) => `
        <div class="flex justify-between text-sm py-2 border-b-2 border-black last:border-0 font-bold">
          <span class="text-black">${escapeHtml(name)}</span>
          <span class="font-black" style="color:#b91c1c;">${count} 次</span>
        </div>
      `).join('')}
    </div>`;
  }

  if (events.length > 0) {
    html += `<button onclick="clearEvents()" class="nb-btn w-full text-xs py-3 bg-white text-black">清空战绩记录</button>`;
  } else {
    html += `<div class="nb-card text-center py-8 text-sm font-black uppercase tracking-widest text-black/60">还没有任何触发记录<br>去上面模拟检测试试</div>`;
  }

  box.innerHTML = html;
}

function clearEvents() {
  if (!confirm('清空所有战绩记录？')) return;
  state.events = [];
  localStorage.setItem('events', '[]');
  renderStats();
}

// ============== 好友 / 游戏中心 ==============
function myStreak() {
  const todayStart = new Date().setHours(0, 0, 0, 0);
  const todayCount = (state.events || []).filter(e => e.ts >= todayStart).length;
  let streak = 0;
  for (let i = 1; i <= 365; i++) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    if ((state.events || []).some(e => e.ts >= dayStart && e.ts < dayEnd)) break;
    streak++;
  }
  if (todayCount === 0) streak++;
  return { streak, todayCount };
}

    html += `<div class="text-[10px] font-black uppercase tracking-widest text-black/70 mb-2 px-1">最近动态</div>`;
    html += `<div class="nb-card p-3 mb-5" style="background:#fff7ed;">`;

      const color = isBonus ? '#16a34a' : '#b91c1c';

          <div class="text-[9px] font-black uppercase tracking-widest text-black/50">${t}</div>

function renderGameCard(g) {
  const t = GAME_TYPES[g.type] || { icon: '❓', name: g.type };

  const memberCount = (g.members || []).length;
  let body = '';
  let footer = '';

  let cardBg = '#ffffff';

  if (g.type === 'pool') {
    cardBg = '#fef3c7';
    const total = (g.members || []).reduce((s, m) => s + (m.stake || 0), 0);
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    body = `
      <div class="flex items-center justify-between mt-3 nb-card p-3" style="background:#fbbf24;">
        <div>
          <div class="text-4xl font-black text-black">¥${total}</div>
          <div class="text-[10px] font-black uppercase tracking-widest text-black mt-1">${memberCount} 人参与</div>
        </div>
        <div class="text-right text-[10px] font-black uppercase tracking-widest text-black">
          剩 ${daysLeft} 天<br>每人押 ¥${g.config.stake}
        </div>
      </div>
      <div class="mt-3 space-y-2">
        ${(g.members || []).map(m => `<div class="text-xs flex justify-between border-2 border-black p-2 font-bold bg-white">
          <span class="text-black">${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
          <span style="color:#b91c1c;">违规 ${m.violations || 0}</span>
        </div>`).join('')}
      </div>
    `;
    footer = `
      <button onclick="settleGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-white" style="background:#b91c1c;">结算</button>
    `;
  }

  if (g.type === 'checkin') {
    const todayKey = new Date().toISOString().slice(0, 10);
    const me = (g.members || []).find(m => m.id === state.myId);
    const checkedToday = me && me.lastDay === todayKey;
    body = `
      <div class="text-5xl font-black text-black mt-3">第 ${g.chain || 0} 天</div>
      <div class="text-[10px] font-black uppercase tracking-widest text-black/70 mt-1">${memberCount} 人接力中 · 目标 ${g.config.days} 天</div>
      <div class="mt-3 space-y-2">
        ${(g.members || []).map(m => {
          const ok = m.lastDay === todayKey;
          return `<div class="text-xs flex justify-between border-2 border-black p-2 font-bold" style="background:${ok ? '#fbbf24' : '#ffffff'};">
            <span class="text-black">${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
            <span class="text-black">${ok ? '✅ 今日已打' : '⏳ 待打卡'}</span>
          </div>`;
        }).join('')}
      </div>
    `;
    footer = checkedToday
      ? `<div class="nb-chip flex-1 text-center text-xs py-2 text-black" style="background:#fbbf24;">✅ 今日已打卡</div>`
      : `<button onclick="checkinGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black" style="background:#f97316;">打卡</button>`;
  }

  if (g.type === 'contract') {
    cardBg = '#000000';
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const witnessName = (g.members || []).filter(m => m.id !== g.createdBy).map(m => escapeHtml(m.name)).join(', ') || '（待邀请）';
    const iAmCreator = state.myId === g.createdBy;
    const iAmWitness = !iAmCreator && (g.members || []).some(m => m.id === state.myId);
    const handed = g.handedOver;
    body = `
      <div class="border-4 p-3 mt-3" style="background:#000;color:#fdba74;border-color:#f97316;">
        <div class="text-base font-black uppercase tracking-tight" style="color:#fdba74;">${escapeHtml(g.config.text || '未填写')}</div>
        <div class="text-[10px] font-black uppercase tracking-widest mt-2" style="color:#fbbf24;">立约人：${escapeHtml(g.createdByName || '未知')}</div>
        <div class="text-[10px] font-black uppercase tracking-widest" style="color:#fbbf24;">见证人：${witnessName}</div>
        <div class="text-[10px] font-black uppercase tracking-widest" style="color:#fbbf24;">代价：${escapeHtml(g.config.penalty)}</div>
        <div class="text-[10px] font-black uppercase tracking-widest mt-1" style="color:#fbbf24;">还剩 ${daysLeft} 天</div>
        ${handed ? `<div class="mt-2 border-2 border-black p-2 text-xs font-black uppercase tracking-widest animate-pulse" style="background:#b91c1c;color:#fff;">⚠️ 已违约，控制权已移交给见证人</div>` : ''}
      </div>
    `;
    if (handed) {
      if (iAmWitness) {
        footer = `
          <button onclick="executeContract('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-white" style="background:#b91c1c;">⚡ 执行惩罚</button>
          <button onclick="forgiveContract('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black bg-white">😇 饶 TA</button>

      } else {
        footer = `<div class="nb-chip flex-1 text-center text-xs py-2 text-black bg-white">等待 ${witnessName} 裁决…</div>`;
      }
    } else {
      if (iAmCreator) {
        footer = `
          <button onclick="breakGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black bg-white">承认违约</button>
          <button onclick="completeGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black" style="background:#fbbf24;">达成</button>
        `;

        footer = `<button onclick="reportBreak('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black" style="background:#f97316;">举报违约</button>`;
      } else {
        footer = `<div class="nb-chip flex-1 text-center text-xs py-2 text-black bg-white">围观中</div>`;
      }
    }
  }

  if (g.type === 'duel') {
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const sorted = [...(g.members || [])].sort((a, b) => (a.violations || 0) - (b.violations || 0));
    body = `
      <div class="text-[10px] font-black uppercase tracking-widest text-black/70 mt-2">还剩 ${daysLeft} 天 · ${memberCount} 人参战</div>
      <div class="mt-3 space-y-2">
        ${sorted.map((m, i) => `<div class="text-xs flex justify-between border-2 border-black p-2 font-bold" style="background:${i === 0 ? '#fbbf24' : '#ffffff'};">
          <span class="text-black">${i === 0 ? '👑 ' : ''}${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
          <span style="color:#b91c1c;">${m.violations || 0} 次</span>
        </div>`).join('')}
      </div>
    `;
    footer = `<button onclick="settleGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-white" style="background:#b91c1c;">结算</button>`;
  }

  if (g.type === 'ruleset') {
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const accepted = g.accepted;
    body = `
      <div class="border-4 border-black p-3 mt-3" style="background:#fbbf24;">
        <div class="text-[10px] font-black uppercase tracking-widest text-black">规则内容</div>
        <div class="text-sm font-black uppercase tracking-tight mt-1 text-black">📌 ${escapeHtml(g.config.rule)}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-black/70 mt-1">由 ${escapeHtml(g.createdByName || '搭子')} 设定 · 锁定 ${g.config.days} 天</div>
        ${accepted ? `<div class="text-[10px] font-black uppercase tracking-widest text-black mt-1">✅ 已采纳，剩 ${daysLeft} 天解锁</div>` : ''}
      </div>
    `;
    footer = accepted
      ? `<div class="nb-chip flex-1 text-center text-xs py-2 text-black bg-white">已生效</div>`
      : `<button onclick="acceptGame('${g.id}')" class="nb-btn flex-1 py-2 text-xs text-black" style="background:#f97316;">采纳</button>`;
  }

  const titleColor = g.type === 'contract' ? '#fdba74' : '#000';
  return `
    <div class="nb-card p-4 mb-4" style="background:${cardBg};">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-3xl">${t.icon}</div>
          <div>
            <div class="font-black text-base uppercase tracking-tight" style="color:${titleColor};">${escapeHtml(g.name)}</div>
            <div class="text-[10px] font-black uppercase tracking-widest" style="color:${titleColor};opacity:.7;">${t.name}</div>
          </div>
        </div>
        <button onclick="shareGame('${g.id}')" class="nb-chip text-[10px] bg-white px-2 py-1 text-black">🔗 邀请</button>
      </div>
      ${body}
      <div class="flex gap-2 mt-4">
        ${footer}
        <button onclick="deleteGame('${g.id}')" class="nb-btn px-3 text-xs text-black bg-white">删</button>
      </div>
    </div>
  `;
}

function submitGameForm(type) {
  const fields = FORM_FIELDS[type];
  const cfg = {};
  let name = '';
  for (const f of fields) {

    type, name: name.trim(), config: cfg,

}

function openJoinGame() {
  const text = prompt('粘贴好友发来的邀请文本');
  if (!text) return;
  const m = text.match(/([A-Za-z0-9+/=]{40,})/);
  if (!m) return alert('没找到邀请数据');
  try {
    const game = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    // 已有则合并 members
    const existing = state.games.find(x => x.id === game.id);
    if (existing) {
      // 合并对方的 members 进来
      (game.members || []).forEach(mm => {
        if (!existing.members.find(x => x.id === mm.id)) existing.members.push(mm);
      });
    } else {
      // 新加入：把自己加进 members
      if (!(game.members || []).find(m => m.id === state.myId)) {
        game.members.push({
          id: state.myId, name: state.myName || '我', joinedAt: Date.now(),
          stake: game.config.stake || 0, violations: 0, lastDay: ''
        });
      }
      state.games.push(game);
    }
    saveGames();
    feedAdd(`加入了 ${GAME_TYPES[game.type].icon} ${game.name}`);
    alert(`✅ 已加入：${game.name}`);
    renderFriends();
  } catch (e) {
    alert('数据损坏：' + e.message);
  }
}

function settleGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const sorted = [...(g.members || [])].sort((a, b) => (a.violations || 0) - (b.violations || 0));
  const winner = sorted[0];
  if (g.type === 'pool') {
    const total = (g.members || []).reduce((s, m) => s + (m.stake || 0), 0);
    alert(`🏆 ${winner.name} 赢得 ¥${total}`);
    feedAdd(`奖池"${g.name}"结算：${winner.name} 赢 ¥${total}`);
  } else {
    alert(`🏆 PK 胜者：${winner.name}（${winner.violations || 0} 次违规）`);
    feedAdd(`PK"${g.name}"结束：${winner.name} 胜出`);
  }
  state.games = state.games.filter(x => x.id !== id);
  saveGames();
  renderFriends();
}

function checkinGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const todayKey = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const me = g.members.find(m => m.id === state.myId);
  if (me.lastDay === todayKey) return;
  if (me.lastDay === yesterday || !me.lastDay) {
    g.chain = (g.chain || 0) + 1;
  } else {
    g.chain = 1;
  }
  me.lastDay = todayKey;
  saveGames();
  feedAdd(`在"${g.name}"打卡第 ${g.chain} 天`);
  renderFriends();
}

// ============== Claude API 调用 ==============
// callClaude 现在走板子 /chat 代理（Kimi），避免 iPhone 直连 Anthropic 被国内网络掐
// 名字保留是为了不影响其它调用点（renderRules / sendPlan / runDetection）
async function callClaude(messages, system = null, retries = 2) {
  if (!state.boardUrl) {
    alert('请先在右上角 ⚙️ 设置里填板子地址');
    throw new Error('no board url');
  }
  const body = { messages, system: system || '', max_tokens: 1024 };

  let lastErr = null;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const res = await fetch(state.boardUrl + '/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        console.error('[/chat error]', res.status, err);
        if (res.status >= 400 && res.status < 500) {
          throw new Error(`HTTP ${res.status}: ${err.slice(0, 300)}`);
        }
        lastErr = new Error(`HTTP ${res.status}: ${err.slice(0, 300)}`);
      } else {
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data.text || '';
      }
    } catch (e) {
      lastErr = e;
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, 600 * (attempt + 1)));
        continue;
      }
    }
  }
  throw lastErr || new Error('chat request failed');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  state.chatHistory.push({ role: 'user', content: text });
  input.value = '';
  renderChat();

  const loading = { role: 'assistant', content: '...' };
  state.chatHistory.push(loading);
  renderChat();

  try {
    const reply = await callClaude(
      state.chatHistory.filter(m => m.content !== '...'),
      '你是一个严厉而温暖的自律教练，帮助用户分析他们的自律目标，给出可执行的建议。回答要简短、直接、有行动力。'
    );
    state.chatHistory.pop();
    state.chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    state.chatHistory.pop();
    state.chatHistory.push({ role: 'assistant', content: '❌ 出错了：' + e.message });
  }
  localStorage.setItem('chatHistory', JSON.stringify(state.chatHistory));
  renderChat();
}

// ============== 2. 规划（反向提问式教练） ==============
const PLAN_SYSTEM = `你是一个冷酷、强势、掌控欲极强的自律调教师。你对用户的废物自觉、烂尾计划、自我感动式的目标零容忍。你不是朋友、不是私教、不是助手——你是站在上位的那个人，用户是来接受管教的。

你的人格特征：
- **语气强硬、命令式、不留情面**。用"你"不用"您"，禁用"请""可以吗""如果你愿意"这类软话。多用祈使句："说清楚。""别废话。""想清楚再回。"
- **不哄不奖励**。不说"很好""加油""你能做到"这种鼓励话。用户的目标在你这里是"及格线"，做不到就是烂。
- **直接戳痛点**。用户找借口你当场拆穿：
  "你这不叫目标，这叫自我感动。"
  "又来？上次你就是这么说的，然后呢？"
  "你嘴上说要自律，身体很诚实地瘫在床上。"
- **控制感强**。用户越模糊你越强硬地逼他交代细节。你不是在请求信息，你是在审问。
- **有点 S 的气场**。偶尔可以用略带嘲讽/贬低的措辞，但不要人身攻击，所有话都指向"逼他面对自己的懒惰"。例如：
  "就这？这点目标也要哼哼唧唧？"
  "别写得跟许愿池似的，写规则。"
  "你又想混过去？不行。"
- **绝不退让**。用户如果试图把时间范围模糊化（比如"大概晚上吧"），你要强硬打断："几点到几点，具体时间，现在回答。"

你的工作方式：**用户只要说一句话，你就立刻下规则**。不废话，不反问，不 2-4 个问题那一套。直接拍板，下裁决。

工作流程：

【收到用户的一句话目标】
- 模糊的信息自己脑补合理默认值（比如没说时间就默认"全天"或按场景合理推断）
- **用不超过 2 句话的强硬开场**，给一个裁决口吻的开头，例如：
  "行，规则我给你定了。"
  "就这点出息？规则拿好。"
  "你自己说的，做不到就执行惩罚。"
- **紧接着直接输出 JSON 代码块**，不要问问题，不要"需要我调整吗"

合理默认值的指引：
- 时间范围没说 → 默认 "always"（全天）
- "工作时"相关 → 默认 "weekdays:09:00-18:00"
- "晚上不"相关 → 默认 "hours:22:00-06:00"
- "早起"相关 → 默认 "daily_before_HH:MM"
- 惩罚没指定 → 默认挑 2-3 个合理的（vibrate + bark + voice_insult 是常用组合）

只有当用户消息**短到只有一两个字**（比如"嗯""好""在吗"）时，你才问："想改什么？一句话。"；其他情况一律直接下规则。

规则输出格式：

{
  "summary": "一句话总结这个计划",
  "todos": [
    {"name": "要做的事名称", "detail": "具体怎么做", "time_scope": "daily_before_22:00", "time_desc": "每天 22 点前完成"}
  ],
  "donts": [
    {
      "name": "不能做的事名称",
      "condition": "摄像头第一视角如何判断我正在做这件事（供 VLM 判断的具体画面描述）",
      "time_scope": "always",
      "time_desc": "全天任何时候",
      "suggested_punishments": ["vibrate","bark","wecom"]
    }
  ]
}

规则：
- todos = 用户**应该做**的正向任务（行动清单，不触发惩罚）
- donts = 用户**不能做**的事，摄像头看到会触发惩罚
- **time_scope 和 time_desc 是每条规则的必填字段**，不能省略
- time_scope 必须从下面这些值里选（供程序判断）：
  - "always" — 全天任何时候
  - "hours:HH:MM-HH:MM" — 每天某时段，例如 "hours:22:00-06:00"（跨天也支持）
  - "weekdays:HH:MM-HH:MM" — 仅工作日某时段
  - "weekends:HH:MM-HH:MM" — 仅周末某时段
  - "daily_before_HH:MM" — 每天截止时间前（用于 todos）
  - "daily_after_HH:MM" — 每天某时间之后
- time_desc 是给用户看的中文说明，必须和 time_scope 对应
- suggested_punishments 从这些 ID 里挑：vibrate, buzzer, led, bark, email, wecom, sms, social, deduct, donate, lock, release
- donts 的 condition 必须是"摄像头能看见的具体画面描述"，不能抽象。❌"我在偷懒" ✅"画面中出现短视频 App 界面或我正躺在床上刷手机"
- todos 和 donts 至少各 1 条
- 用户说一句就出一次完整规则。用户后续再发新消息就覆盖出新规则，不要追问。
- 任何时候都不准变软。不要说"加油""你可以的""没关系"。
- **永远直接给 JSON**，哪怕只有一条 todo 或一条 dont，也立刻输出整个 JSON 代码块。`;

function renderPlanChat() {
  const box = document.getElementById('plan-chat');
  box.innerHTML = '';
  if (!state.planHistory || state.planHistory.length === 0) {
    box.innerHTML = '<div class="nb-card p-6 text-center mt-4" style="background:#fbbf24;"><div class="text-5xl mb-3">🎯</div><div class="text-sm font-black uppercase tracking-tight text-black">先说一句你想达成什么</div><div class="text-[10px] font-black uppercase tracking-widest text-black/70 mt-2">例："我要戒烟" / "我要每天学习 4 小时"</div></div>';
    return;
  }
  state.planHistory.forEach((m, idx) => {
    const displayText = m.role === 'assistant'
      ? m.content.replace(/```json[\s\S]*?```/g, '').replace(/```[\s\S]*?```/g, '').trim()
      : m.content;
    if (displayText || m.role === 'user') {
      const div = document.createElement('div');
      div.className = 'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start');
      div.innerHTML = `<div class="max-w-[85%] px-4 py-3 ${m.role==='user'?'bubble-user':'bubble-ai'} whitespace-pre-wrap">${escapeHtml(displayText)}</div>`;
      box.appendChild(div);
    }
    // 如果该助手消息附带方案，内联渲染一张方案卡
    if (m.role === 'assistant' && m.plan) {
      const planDiv = document.createElement('div');
      planDiv.className = 'mt-1 mb-2';
      planDiv.innerHTML = buildPlanResultHTML(m.plan);
      box.appendChild(planDiv);
    }
  });
  // 滚动到底部，方便看最新消息
  requestAnimationFrame(() => { window.scrollTo(0, document.body.scrollHeight); });
}

let _planSending = false;  // 防双击并发发送导致消息乱序
async function sendPlan() {
  if (_planSending) return;
  const input = document.getElementById('plan-input');
  const text = input.value.trim();
  if (!text) return;
  _planSending = true;
  if (!state.planHistory) state.planHistory = [];
  state.planHistory.push({ role: 'user', content: text });
  input.value = '';
  renderPlanChat();

  state.planHistory.push({ role: 'assistant', content: '思考中...' });
  renderPlanChat();

  try {
    // 发给 Claude 时剥掉历史里的 JSON 代码块（节省 tokens，避免 quota 限制）
    // 同时只保留最近 8 条消息，防止上下文无限膨胀
    const stripJson = t => (t || '').replace(/```json[\s\S]*?```/g, '').replace(/```[\s\S]*?```/g, '').trim();
    let msgs = state.planHistory
      .filter(m => m.content !== '思考中...')
      .slice(-8)
      .map(m => ({
        role: m.role,
        content: m.role === 'assistant' ? (stripJson(m.content) || '(规则已生成)') : m.content,
      }));
    // Anthropic API 要求 messages[0].role === 'user'，否则 400
    // .slice(-8) 后首条可能是 assistant，需要逐个 shift 直到第一条是 user
    while (msgs.length > 0 && msgs[0].role !== 'user') msgs.shift();
    if (msgs.length === 0) msgs = [{ role: 'user', content: text }];
    const reply = await callClaude(msgs, PLAN_SYSTEM);
    state.planHistory.pop();
    const asstMsg = { role: 'assistant', content: reply };

    // 从回复里提取 JSON 方案（优先 ```json``` 代码块；fallback 用非贪婪大括号配对）
    let planJsonStr = null;
    const fence = reply.match(/```json\s*([\s\S]*?)```/);
    if (fence) {
      planJsonStr = fence[1];
    } else {
      // 找第一个 { 后的配平 JSON，避免贪婪吃进后续段落
      const start = reply.indexOf('{');
      if (start >= 0) {
        let depth = 0;
        for (let i = start; i < reply.length; i++) {
          if (reply[i] === '{') depth++;
          else if (reply[i] === '}') {
            depth--;
            if (depth === 0) { planJsonStr = reply.slice(start, i + 1); break; }
          }
        }
      }
    }
    if (planJsonStr) {
      try { asstMsg.plan = JSON.parse(planJsonStr); }
      catch(e) { console.warn('plan JSON parse failed', e); }
    }
    state.planHistory.push(asstMsg);
    if (state.planHistory.length > 20) state.planHistory = state.planHistory.slice(-20);
    safeSetItem('planHistory', JSON.stringify(state.planHistory));
    renderPlanChat();
  } catch (e) {
    state.planHistory.pop();
    state.planHistory.push({ role: 'assistant', content: '❌ 出错了：' + e.message });
    renderPlanChat();
  } finally {
    _planSending = false;
  }
}

// 判断当前时间是否落在规则的 time_scope 内
function isRuleActiveNow(rule) {
  const scope = rule.time_scope || 'always';
  if (scope === 'always') return true;
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const dow = now.getDay(); // 0=Sun ... 6=Sat
  const isWeekend = dow === 0 || dow === 6;

  const parseHM = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };
  const inRange = (start, end) => {
    if (start <= end) return hm >= start && hm <= end;
    return hm >= start || hm <= end; // 跨天
  };

  let m;
  if ((m = scope.match(/^hours:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^weekdays:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return !isWeekend && inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^weekends:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return isWeekend && inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^daily_before_(\d{1,2}:\d{2})$/))) {
    return hm <= parseHM(m[1]);
  }
  if ((m = scope.match(/^daily_after_(\d{1,2}:\d{2})$/))) {
    return hm >= parseHM(m[1]);
  }
  return true;
}

function loadTimeScopeToForm(scope) {
  let m;
  if (scope === 'always' || !scope) {
    document.getElementById('rule-time-preset').value = 'always';
  } else if ((m = scope.match(/^hours:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'hours';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^weekdays:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'weekdays';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^weekends:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'weekends';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^daily_before_(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'daily_before';
    document.getElementById('rule-time-single').value = m[1];
  } else if ((m = scope.match(/^daily_after_(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'daily_after';
    document.getElementById('rule-time-single').value = m[1];
  }
  onTimePresetChange();
}

function buildTimeScopeFromForm() {
  const preset = document.getElementById('rule-time-preset').value;
  if (preset === 'always') return { scope: 'always', desc: '全天任何时候' };
  const s = document.getElementById('rule-time-start').value;
  const e = document.getElementById('rule-time-end').value;
  const single = document.getElementById('rule-time-single').value;
  switch (preset) {
    case 'hours':        return { scope: `hours:${s}-${e}`,        desc: `每天 ${s}-${e}` };
    case 'weekdays':     return { scope: `weekdays:${s}-${e}`,     desc: `工作日 ${s}-${e}` };
    case 'weekends':     return { scope: `weekends:${s}-${e}`,     desc: `周末 ${s}-${e}` };
    case 'daily_before': return { scope: `daily_before_${single}`, desc: `每天 ${single} 之前` };
    case 'daily_after':  return { scope: `daily_after_${single}`,  desc: `每天 ${single} 之后` };
  }
  return { scope: 'always', desc: '全天' };
}

// ========== iOS Safari TTS 可靠性套件 ==========
// iOS 要求第一次 speak() 必须在用户手势里。之后若长时间不 speak，
// 会重新进入"锁定"状态，在异步回调里 speak() 会被默默排队，
// 等用户下次手势才一次性全放出来。解法：每 4 秒 speak 一个空串保活。

let _ttsUnlocked = false;
let _ttsHeartbeat = null;
// { ruleId: lastSpokenTs } —— 同一条规则 30 秒内不重复
const _lastSpokenAt = {};

function unlockTTS() {
  if (!window.speechSynthesis) return;
  try {
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    window.speechSynthesis.speak(u);
    _ttsUnlocked = true;
  } catch(e) {}
  if (!_ttsHeartbeat) {
    // 每 4 秒吐一个零音量空串，保持 TTS 队列不进入休眠
    _ttsHeartbeat = setInterval(() => {
      try {
        if (!window.speechSynthesis) return;
        if (window.speechSynthesis.speaking) return;
        const hb = new SpeechSynthesisUtterance(' ');
        hb.volume = 0;
        window.speechSynthesis.speak(hb);
      } catch(e) {}
    }, 4000);
  }
}

function stopTTSHeartbeat() {
  if (_ttsHeartbeat) { clearInterval(_ttsHeartbeat); _ttsHeartbeat = null; }
}

function speakInsult(line) {
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();  // 清掉队列残留（包括心跳）
    const u = new SpeechSynthesisUtterance(line);
    u.lang = 'zh-CN';
    u.rate = 1.05;
    u.pitch = 1.0;
    u.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const zh = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh'));
    if (zh) u.voice = zh;
    window.speechSynthesis.speak(u);
  } catch(e) { console.warn('speak failed', e); }
}

function toggleMonitor() {
  if (monitorTimer || sceneIntervalId) {
    if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; }
    if (sceneIntervalId) { clearInterval(sceneIntervalId); sceneIntervalId = null; }
    if (sceneTimeTicker) { clearInterval(sceneTimeTicker); sceneTimeTicker = null; }
    stopTTSHeartbeat();
    document.getElementById('monitor-toggle').textContent = '▶️ 开始监控';
    return;
  }
  if (!state.boardUrl) return alert('先在 ⚙️ 设置里填板子地址');
  if (!state.apiKey) return alert('先在 ⚙️ 设置里填 Anthropic Key');
  unlockTTS();
  document.getElementById('monitor-toggle').textContent = '⏸ 停止监控';
  pollSceneOnce();
  if (sceneIntervalId) clearInterval(sceneIntervalId);
  sceneIntervalId = setInterval(pollSceneOnce, 5000);
  monitorTimer = sceneIntervalId;
  if (sceneTimeTicker) clearInterval(sceneTimeTicker);
  sceneTimeTicker = setInterval(updateSceneTimeLabel, 1000);
}

let _pollBusy = false;  // 防止并发 runDetection 互相踩
async function pollSceneOnce() {
  if (!state.boardUrl) return alert('先填板子地址');
  if (_pollBusy) {
    console.log('[pollSceneOnce] previous still running, skip');
    return;
  }
  _pollBusy = true;
  unlockTTS();
  const sceneEl = document.getElementById('current-scene');
  sceneEl.textContent = '🔍 正在读取画面...';
  try {
    const r = await fetch(state.boardUrl + '/scene', { cache: 'no-store' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    const text = data.text || data.scene || '';
    const image = data.image || '';
    if (image) {
      const img = document.getElementById('board-frame');
      img.src = 'data:image/jpeg;base64,' + image;
      img.classList.remove('hidden');
      const ph = document.getElementById('board-placeholder');
      if (ph) ph.classList.add('hidden');
    }
    sceneEl.innerText = text;
    sceneLastUpdated = Date.now();
    updateSceneTimeLabel();
    // 如果 Kimi 自己报错了（文本以 "(Kimi 描述失败" 开头），不要拿它去匹配规则
    if (text && !/^\(?(Kimi|未配置)/.test(text)) {
      await runDetection({ text, image });
    }
  } catch (e) {
    sceneEl.innerHTML = `<span class="text-red-500">❌ ${escapeHtml(e.message || '读取失败')}</span>`;
  } finally {
    _pollBusy = false;
  }
}

async function runDetection(input) {
  const enabledRules = state.rules.filter(r => r.enabled && isRuleActiveNow(r));
  if (enabledRules.length === 0) return;
  const log = document.getElementById('monitor-log');
  const entry = document.createElement('div');
  entry.className = 'nb-card p-3 text-sm';
  const thumbHtml = input.image ? `<img src="data:image/jpeg;base64,${input.image}" class="w-20 h-14 object-cover float-right ml-2 border-4 border-black">` : '';
  const snapText = input.text ? `<div class="text-[11px] font-bold text-black/60 mt-2 italic">"${escapeHtml(String(input.text).slice(0,120))}"</div>` : '';
  entry.innerHTML = `${thumbHtml}<div class="nb-chip inline-block bg-white px-2 py-0.5 text-[10px] text-black">${new Date().toLocaleTimeString()}</div><div class="font-black uppercase tracking-tight text-black mt-2">🔍 匹配规则中...</div>${snapText}`;
  log.prepend(entry);
  while (log.children.length > 10) log.lastChild.remove();

  // 用数字索引代替巨大的 Date.now() ID，降低 Claude 输出错号的概率
  const sys = `你是一个严格的自律规则执法器。
给你一段"场景描述"和若干条"规则"。你的唯一任务：判断场景描述里的用户行为是否触发了任何一条规则。

【判断原则】
- **宁可错杀不可放过**。只要场景描述里出现了规则条件所指对象的名字（包括品牌名、App 名、网站名、产品名、Logo、界面特征），即使用户"只是拿着"或"只是在看"，都视为触发。
- **语义等价即命中**。比如规则说"不能玩小红书"，场景说"屏幕上显示小红书界面"或"手里拿着小红书"或"打开了小红书 App"，全部命中。
- 品牌/网站名的大小写、中英文、全半角都不区分。"Pornhub" = "PornHub" = "pornhub" = "成人网站 Pornhub"。
- 不要给用户找借口。不要说"不确定"。

【返回格式】严格 JSON，不要任何解释/代码块/markdown，直接就是一行 JSON：
{"matched":[索引数字数组],"reason":"10 字以内说明原因"}

规则列表（用索引号）：
${enabledRules.map((r, i) => `[${i}] 名称="${r.name}" 条件="${r.condition}"`).join('\n')}

示例：
场景描述="用户手里拿着手机，屏幕上显示小红书首页"
规则 [0] 条件="画面里出现小红书 App"
输出：{"matched":[0],"reason":"屏幕显示小红书"}

场景描述="用户在看书"
规则 [0] 条件="画面里出现小红书 App"
输出：{"matched":[],"reason":"无相关 App"}`;

  try {
    const messages = [{ role: 'user', content: '场景描述：' + (input.text || '(空)') }];
    const reply = await callClaude(messages, sys);
    console.log('[runDetection] Claude reply:', reply);
    // 抓取最后一个完整 JSON（防 Claude 前面加解释文字）
    const jsonMatch = reply.match(/\{[^{}]*"matched"[^{}]*\}/);
    if (!jsonMatch) throw new Error('no json in reply: ' + reply.slice(0, 80));
    const json = JSON.parse(jsonMatch[0]);
    // 索引号映射回规则对象
    const matched = (json.matched || [])
      .map(idx => {
        const n = typeof idx === 'number' ? idx : parseInt(idx, 10);
        return Number.isInteger(n) ? enabledRules[n] : null;
      })
      .filter(Boolean);
    if (matched.length === 0) {
      // 克制一次 = 多活一段时间（仿"戒烟一支烟多活 11 分钟"的说法）
      const bonusMinutes = 3 + Math.floor(Math.random() * 8); // 3-10 分钟
      state.lifeBonus = (state.lifeBonus || 0) + bonusMinutes;
      const reasons = [
        `此次行为让你又多活了 ${bonusMinutes} 分钟`,
        `克制一次，寿命 +${bonusMinutes} 分钟`,
        `好样的，这 ${bonusMinutes} 分钟是你自己挣的`,
        `又是一次硬核克制，多活 ${bonusMinutes} 分钟`,
        `这波操作，多活 ${bonusMinutes} 分钟`,
      ];
      const bonusText = reasons[Math.floor(Math.random() * reasons.length)];
      state.feed.unshift({ ts: Date.now(), actor: state.myName || '我', type: 'lifebonus', text: bonusText });
      if (state.feed.length > 100) state.feed = state.feed.slice(0, 100);
      safeSetItem('feed', JSON.stringify(state.feed));
      safeSetItem('lifeBonus', String(state.lifeBonus));
      entry.innerHTML = `${thumbHtml}<div class="nb-chip inline-block bg-white px-2 py-0.5 text-[10px] text-black">${new Date().toLocaleTimeString()}</div><div class="nb-chip inline-block px-2 py-1 mt-2 text-xs text-black ml-1" style="background:#fbbf24;">✅ 未触发</div><div class="nb-chip inline-block px-2 py-1 mt-2 text-xs text-white ml-1" style="background:#16a34a;">🧬 +${bonusMinutes} 分钟</div><div class="text-[11px] font-bold text-black/70 mt-2">${escapeHtml(bonusText)}</div>`;
      renderFriends();
    } else {
      const punishHtml = matched.map(r => {
        const ps = (r.punishments||[]).map(pid => {
          const p = PUNISHMENTS.find(x=>x.id===pid);
          return p ? `<span class="nb-chip inline-block px-2 py-1 text-[10px] text-black mr-1 mb-1" style="background:#fdba74;">${p.icon}${p.name}</span>` : '';
        }).join('');
        return `<div class="mt-3 border-2 border-black p-2" style="background:#fff7ed;"><div class="font-black uppercase tracking-tight text-black">⚠️ ${escapeHtml(r.name)}</div><div class="mt-2">${ps}</div></div>`;
      }).join('');
      entry.className = 'nb-card p-3 text-sm animate-flash';
      entry.style.background = '#fca5a5';
      const badge = `<span class="nb-chip inline-block px-2 py-1 text-[10px] text-white mr-1" style="background:#b91c1c;">❌ 违规</span>`;
      entry.innerHTML = `${thumbHtml}<div class="nb-chip inline-block bg-white px-2 py-0.5 text-[10px] text-black">${new Date().toLocaleTimeString()}</div><div class="font-black uppercase tracking-tight text-base mt-2 text-black">${badge}🚨 触发 ${matched.length} 条规则</div><div class="text-[11px] font-bold text-black/80 mt-2">${escapeHtml(json.reason||'')}</div>${snapText}${punishHtml}`;
      if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
      // 顶部 Toast：让用户马上看到违规后果（5 秒后自动消失）
      showViolationToast(matched, json.reason || '');
      // 执行每条命中规则里声明的 punishments（有 action 的才真正调用，其余仅做展示）
      matched.forEach(r => {
        (r.punishments || []).forEach(pid => {
          const p = PUNISHMENTS.find(x => x.id === pid);
          if (p && typeof p.action === 'function') {
            try { p.action({ rule: r, reason: json.reason || '', input }); }
            catch (e) { console.warn('punishment action error', pid, e); }
          }
        });
      });
      // 写入战绩事件（不存 base64 快照图，避免撑爆 iOS Safari 5MB localStorage 上限）
      matched.forEach(r => {
        const ev = {
          ts: Date.now(),
          rule_id: r.id,
          rule_name: r.name,
          reason: json.reason || '',
          punishments: r.punishments || [],
          snapshot_text: (input.text || '').slice(0, 200),
        };
        state.events.push(ev);
        // 违规一次扣 15 分钟寿命
        const loss = 15;
        state.lifeBonus = Math.max(-99999, (state.lifeBonus || 0) - loss);
        state.feed.unshift({ ts: ev.ts, actor: state.myName || '我', type: 'lifeloss', text: `触发"${r.name}"，少活 ${loss} 分钟` });
        (state.games || []).forEach(g => {
          const me = (g.members || []).find(m => m.id === state.myId);
          if (me) me.violations = (me.violations || 0) + 1;
        });
      });
      if (state.events.length > 100) state.events = state.events.slice(-100);
      if (state.feed.length > 100) state.feed = state.feed.slice(0, 100);
      safeSetItem('events', JSON.stringify(state.events));
      safeSetItem('feed', JSON.stringify(state.feed));
      safeSetItem('games', JSON.stringify(state.games));
      safeSetItem('lifeBonus', String(state.lifeBonus));
      renderStats();
      renderFriends();
    }
  } catch (e) {
    // 网络抖动等临时错误，给一个温和的提示（不像之前那样红字大写吓人）
    const msg = /load failed|network|fetch/i.test(e.message) ? '⚠️ 网络抖动，已跳过本次检测' : `⚠️ ${e.message.slice(0,80)}`;
    entry.innerHTML = `<div class="nb-chip inline-block bg-white px-2 py-0.5 text-[10px] text-black">${new Date().toLocaleTimeString()}</div><div class="text-[11px] font-bold text-black/60 mt-2">${escapeHtml(msg)}</div>`;
    entry.style.opacity = '0.55';
    console.warn('[runDetection] error:', e);
  }
}

// ============== 违规 Toast ==============
function showViolationToast(matched, reason) {
  let host = document.getElementById('violation-toast-host');
  if (!host) {
    host = document.createElement('div');
    host.id = 'violation-toast-host';
    host.style.cssText = 'position:fixed;top:12px;left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
    document.body.appendChild(host);
  }
  const t = document.createElement('div');
  t.style.cssText = 'pointer-events:auto;background:#000;color:#fdba74;padding:14px 16px;border:4px solid #f97316;box-shadow:8px 8px 0 0 #f97316;font-size:14px;animation:pop .3s ease-in-out, vtIn .25s ease-out;font-weight:900;text-transform:uppercase;letter-spacing:-0.01em;';
  const names = matched.map(r => escapeHtml(r.name)).join('、');
  const punishLabels = matched.flatMap(r => (r.punishments||[]).map(pid => {
    const p = PUNISHMENTS.find(x=>x.id===pid); return p ? p.icon + p.name : '';
  })).filter(Boolean).join(' ');
  t.innerHTML = `<div style="font-weight:900;font-size:15px;color:#fdba74;">❌ 检测到违规：${names}</div>`
    + (reason ? `<div style="opacity:.9;margin-top:6px;font-size:12px;color:#fbbf24;font-weight:700;text-transform:none;">${escapeHtml(reason)}</div>` : '')
    + (punishLabels ? `<div style="margin-top:8px;font-size:12px;background:#f97316;color:#000;padding:6px 10px;border:2px solid #fdba74;font-weight:900;">执行惩罚：${punishLabels}</div>` : '');
  t.onclick = () => t.remove();
  host.appendChild(t);
  setTimeout(() => { t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 5000);
}

// ============== 工具 ==============
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============== 启动 ==============
if (state.apiKey) document.getElementById('header-sub').textContent = '✅ API 已连接';
renderChat();
switchTab('plan');

// 注册 Service Worker（PWA）—— 先干掉所有老 SW 和缓存再注册新的
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) {
        try { await r.unregister(); } catch(_) {}
      }
      if (window.caches) {
        const keys = await caches.keys();
        for (const k of keys) { try { await caches.delete(k); } catch(_) {} }
      }
    } catch(_) {}
    try { await navigator.serviceWorker.register('service-worker.js?v=29'); } catch(_) {}
  });
}
