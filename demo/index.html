<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="自律发带">
<meta name="theme-color" content="#f97316">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AI 自律发带</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
  .tab-active { color: #f97316; }
  .scroll-hide::-webkit-scrollbar { display: none; }
  .bubble-user { background: #f97316; color: white; }
  .bubble-ai { background: #f3f4f6; color: #111; }
  .punish-card { transition: all .15s; }
  .punish-card.checked { background: #fff7ed; border-color: #f97316; }
  textarea, input { font-size: 16px; }
</style>
</head>
<body class="bg-gray-50 max-w-md mx-auto min-h-screen flex flex-col">

<!-- 顶部 -->
<header class="bg-white border-b sticky top-0 z-10">
  <div class="px-4 py-3 flex items-center justify-between">
    <div>
      <div class="text-lg font-bold">AI 自律发带</div>
      <div class="text-xs text-gray-500" id="header-sub">未连接 API</div>
    </div>
    <button onclick="openSettings()" class="text-2xl">⚙️</button>
  </div>
</header>

<!-- 主内容区 -->
<main class="flex-1 overflow-y-auto pb-20" id="main">

  <!-- 1. 规划（教练）页 -->
  <section data-page="plan" class="p-4 hidden">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-xl font-bold">🎯 AI 规划教练</h2>
      <button onclick="resetPlan()" class="text-xs text-gray-400">重开</button>
    </div>
    <p class="text-sm text-gray-500 mb-3">告诉 AI 你想达成什么。AI 会先反问你几个问题，把目标拆清楚，再给出可执行方案和规则。</p>
    <div id="plan-chat" class="space-y-3 mb-3 min-h-[40vh]"></div>
    <div id="plan-result" class="space-y-3 mb-24"></div>
    <div class="fixed bottom-16 left-0 right-0 max-w-md mx-auto bg-white border-t p-2 flex gap-2" id="plan-input-bar">
      <textarea id="plan-input" rows="1" placeholder="先说一句你想达成的目标..." class="flex-1 border rounded-2xl px-3 py-2 resize-none outline-none focus:border-orange-400"></textarea>
      <button onclick="sendPlan()" class="bg-orange-500 text-white px-4 rounded-2xl">发送</button>
    </div>
  </section>

  <!-- 3. 规则与触发页 -->
  <section data-page="rules" class="p-4 hidden">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-xl font-bold">📋 我的规则</h2>
      <button onclick="newRule()" class="text-orange-500 font-medium">+ 新建</button>
    </div>
    <div id="rules-list" class="space-y-3"></div>
  </section>

  <!-- 4. 监控页（硬件） -->
  <section data-page="monitor" class="p-4 hidden">
    <h2 class="text-xl font-bold mb-2">📷 实时监控</h2>
    <div id="board-status" class="text-xs mb-2"></div>
    <div class="bg-black aspect-video rounded-xl flex items-center justify-center text-white text-sm relative overflow-hidden">
      <img id="board-frame" class="w-full h-full object-cover hidden" alt="">
      <div id="board-placeholder" class="text-center text-xs px-4">未连接发带<br>右上角 ⚙️ 填入板子地址</div>
    </div>
    <div class="grid grid-cols-2 gap-2 mt-3">
      <button id="monitor-toggle" onclick="toggleMonitor()" class="bg-orange-500 text-white py-2 rounded-lg">▶️ 开始监控</button>
      <button onclick="pollSceneOnce()" class="bg-gray-200 py-2 rounded-lg">🔍 立刻检测一次</button>
    </div>
    <div class="mt-3 bg-white border rounded-lg p-3">
      <div class="text-xs text-gray-400">👀 当前看到</div>
      <div id="current-scene" class="text-sm mt-1 text-gray-700">—</div>
    </div>
    <div id="monitor-log" class="mt-3 space-y-2"></div>

    <!-- 战绩区（并入监控页） -->
    <div class="mt-6 pt-4 border-t">
      <h3 class="text-lg font-bold mb-2">📊 我的战绩</h3>
      <div id="stats-content"></div>
    </div>
  </section>

  <!-- 5. 好友页 -->
  <section data-page="friends" class="p-4 hidden">
    <h2 class="text-xl font-bold mb-2">👥 好友监督</h2>
    <div id="friends-content"></div>
  </section>

</main>

<!-- 底部 Tab -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex">
  <button onclick="switchTab('plan')" data-tab="plan" class="flex-1 py-3 text-center text-xs">
    <div class="text-xl">🎯</div>教练
  </button>
  <button onclick="switchTab('rules')" data-tab="rules" class="flex-1 py-3 text-center text-xs">
    <div class="text-xl">📋</div>规则
  </button>
  <button onclick="switchTab('monitor')" data-tab="monitor" class="flex-1 py-3 text-center text-xs">
    <div class="text-xl">📷</div>监控
  </button>
  <button onclick="switchTab('friends')" data-tab="friends" class="flex-1 py-3 text-center text-xs">
    <div class="text-xl">👥</div>好友
  </button>
</nav>

<!-- 设置弹窗 -->
<div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-5 w-full max-w-sm">
    <h3 class="text-lg font-bold mb-3">设置</h3>
    <label class="text-sm text-gray-600">Anthropic API Key</label>
    <input id="api-key-input" type="password" placeholder="sk-ant-..." class="w-full border rounded-lg p-2 mt-1">
    <p class="text-xs text-gray-400 mt-1">仅存在你手机本地，用于规则匹配</p>
    <label class="text-sm text-gray-600 mt-3 block">发带地址（板子 IP）</label>
    <input id="board-url-input" placeholder="http://192.168.50.197:5000" class="w-full border rounded-lg p-2 mt-1">
    <p class="text-xs text-gray-400 mt-1">板子上 server.py 跑起来后填这里</p>
    <div class="flex gap-2 mt-4">
      <button onclick="closeSettings()" class="flex-1 py-2 border rounded-lg">取消</button>
      <button onclick="saveSettings()" class="flex-1 py-2 bg-orange-500 text-white rounded-lg">保存</button>
    </div>
  </div>
</div>

<!-- 规则编辑弹窗 -->
<div id="rule-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-5 w-full max-w-sm max-h-[90vh] overflow-y-auto">
    <h3 class="text-lg font-bold mb-3" id="rule-modal-title">新建规则</h3>

    <label class="text-sm text-gray-600">规则名称</label>
    <input id="rule-name" placeholder="例：不许抽烟" class="w-full border rounded-lg p-2 mt-1 mb-3">

    <label class="text-sm text-gray-600">触发条件（用人话描述）</label>
    <textarea id="rule-condition" rows="2" placeholder="例：画面中我正在抽烟或手里有点燃的香烟" class="w-full border rounded-lg p-2 mt-1 mb-3"></textarea>

    <label class="text-sm text-gray-600">类型</label>
    <select id="rule-type" class="w-full border rounded-lg p-2 mt-1 mb-3">
      <option value="instant">即时违规（看到就罚）</option>
      <option value="window">任务窗口（一段时间内必须做某事）</option>
    </select>

    <label class="text-sm text-gray-600">⏰ 生效时间 <span class="text-red-500">*必填</span></label>
    <select id="rule-time-preset" class="w-full border rounded-lg p-2 mt-1 mb-2" onchange="onTimePresetChange()">
      <option value="always">全天任何时候</option>
      <option value="hours">每天某时段</option>
      <option value="weekdays">仅工作日某时段</option>
      <option value="weekends">仅周末某时段</option>
      <option value="daily_before">每天某时间之前</option>
      <option value="daily_after">每天某时间之后</option>
    </select>
    <div id="time-range-box" class="hidden gap-2 mb-3">
      <input id="rule-time-start" type="time" value="22:00" class="flex-1 border rounded-lg p-2">
      <span class="self-center">→</span>
      <input id="rule-time-end" type="time" value="06:00" class="flex-1 border rounded-lg p-2">
    </div>
    <div id="time-single-box" class="hidden mb-3">
      <input id="rule-time-single" type="time" value="22:00" class="w-full border rounded-lg p-2">
    </div>

    <div class="mb-3">
      <div class="text-sm font-semibold mb-2">⚠️ 选择惩罚（多选）</div>
      <div id="punish-options" class="space-y-2"></div>
    </div>

    <div class="flex gap-2">
      <button onclick="closeRuleModal()" class="flex-1 py-2 border rounded-lg">取消</button>
      <button onclick="saveRule()" class="flex-1 py-2 bg-orange-500 text-white rounded-lg">保存</button>
    </div>
  </div>
</div>

<script>
// ============== 状态 ==============
const state = {
  apiKey: localStorage.getItem('apiKey') || '',
  boardUrl: (localStorage.getItem('boardUrl') || '').replace(/\/$/, ''),
  chatHistory: JSON.parse(localStorage.getItem('chatHistory') || '[]'),
  rules: JSON.parse(localStorage.getItem('rules') || '[]'),
  planHistory: JSON.parse(localStorage.getItem('planHistory') || '[]'),
  events: JSON.parse(localStorage.getItem('events') || '[]'),
  games: JSON.parse(localStorage.getItem('games') || '[]'),
  feed: JSON.parse(localStorage.getItem('feed') || '[]'),
  mercyCards: parseInt(localStorage.getItem('mercyCards') || '0'),
  myId: localStorage.getItem('myId') || '',
  myName: localStorage.getItem('myName') || '',
  editingRule: null,
};
if (!state.myId) {
  state.myId = 'U' + Math.random().toString(36).slice(2, 8).toUpperCase();
  localStorage.setItem('myId', state.myId);
}

const PUNISHMENTS = [
  { id: 'vibrate',   icon: '📳', name: '发带震动',         desc: '硬件就绪后生效',     level: '🟢' },
  { id: 'buzzer',    icon: '🔔', name: '发带蜂鸣',         desc: '公共场合社死',       level: '🟢' },
  { id: 'led',       icon: '💡', name: 'LED 闪光',         desc: '强光视觉干扰',       level: '🟢' },
  { id: 'bark',      icon: '📱', name: '推送通知到自己',    desc: '通过 Bark / 通知',  level: '🟡' },
  { id: 'email',     icon: '📧', name: '邮件提醒自己',     desc: '发到自己邮箱',       level: '🟡' },
  { id: 'wecom',    icon: '👥', name: '企微/钉钉群通报',   desc: '让群里人都知道',     level: '🟠' },
  { id: 'sms',       icon: '📨', name: '短信发给监督人',    desc: '发给指定手机号',     level: '🟠' },
  { id: 'social',    icon: '🌐', name: '自动发微博/朋友圈', desc: '公开打卡失败',       level: '🟠' },
  { id: 'deduct',    icon: '💰', name: '扣钱（押金）',     desc: '从托管押金里扣',     level: '🔴' },
  { id: 'donate',    icon: '🎁', name: '强制小额捐款',     desc: '捐给慈善机构',       level: '🔴' },
  { id: 'lock',      icon: '🔒', name: '锁定电脑/暂停视频', desc: '强制中断当前活动',   level: '🔴' },
  { id: 'release',   icon: '⚠️', name: '释放质押文件',     desc: '不可逆，慎选',       level: '🟣' },
];

// ============== Tab ==============
function switchTab(name) {
  document.querySelectorAll('[data-page]').forEach(s => s.classList.add('hidden'));
  document.querySelector(`[data-page="${name}"]`).classList.remove('hidden');
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('tab-active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('tab-active');
  if (name === 'rules') renderRules();
  if (name === 'plan') renderPlanChat();
  if (name === 'monitor') { renderStats(); refreshBoardStatus(); }
  else { stopFrameStream(); }
  if (name === 'friends') renderFriends();
}

// ============== 战绩 ==============
function renderStats() {
  const box = document.getElementById('stats-content');
  if (!box) return;
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const events = state.events || [];
  const todayEvents = events.filter(e => e.ts >= todayStart);

  // 连续自律天数：从昨天往前数，哪天没有事件就继续，直到遇到有事件的一天
  let streak = 0;
  for (let i = 1; i <= 365; i++) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    const hasEvent = events.some(e => e.ts >= dayStart && e.ts < dayEnd);
    if (hasEvent) break;
    streak++;
  }
  // 今天如果没触发，也算 +1
  if (todayEvents.length === 0) streak++;

  // 最近 7 天每天统计
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    const count = events.filter(e => e.ts >= dayStart && e.ts < dayEnd).length;
    const label = i === 0 ? '今' : new Date(dayStart).getDate() + '';
    days.push({ label, count });
  }
  const maxCount = Math.max(1, ...days.map(d => d.count));

  // 按规则统计命中次数（总计）
  const perRule = {};
  events.forEach(e => {
    perRule[e.rule_name] = (perRule[e.rule_name] || 0) + 1;
  });
  const ruleStats = Object.entries(perRule).sort((a, b) => b[1] - a[1]).slice(0, 5);

  let html = `
    <div class="grid grid-cols-3 gap-2 mb-3">
      <div class="bg-orange-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-orange-600">${todayEvents.length}</div>
        <div class="text-xs text-gray-500">今日触发</div>
      </div>
      <div class="bg-green-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-green-600">${streak}</div>
        <div class="text-xs text-gray-500">连续自律天</div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3 text-center">
        <div class="text-2xl font-bold text-gray-800">${events.length}</div>
        <div class="text-xs text-gray-500">累计触发</div>
      </div>
    </div>

    <div class="bg-white border rounded-xl p-3 mb-3">
      <div class="text-sm font-semibold mb-2">📉 最近 7 天</div>
      <div class="flex items-end gap-1 h-24">
        ${days.map(d => `
          <div class="flex-1 flex flex-col items-center justify-end">
            <div class="text-xs text-gray-400">${d.count || ''}</div>
            <div class="w-full ${d.count > 0 ? 'bg-red-400' : 'bg-green-300'} rounded-t" style="height: ${(d.count / maxCount) * 80}%; min-height: 4px;"></div>
            <div class="text-xs text-gray-500 mt-1">${d.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (ruleStats.length > 0) {
    html += `<div class="bg-white border rounded-xl p-3 mb-3">
      <div class="text-sm font-semibold mb-2">🏆 最常违规的事</div>
      ${ruleStats.map(([name, count]) => `
        <div class="flex justify-between text-sm py-1 border-b last:border-0">
          <span>${escapeHtml(name)}</span>
          <span class="text-red-500 font-semibold">${count} 次</span>
        </div>
      `).join('')}
    </div>`;
  }

  if (events.length > 0) {
    html += `<button onclick="clearEvents()" class="w-full text-xs text-gray-400 py-2">清空战绩记录</button>`;
  } else {
    html += `<div class="text-center text-gray-400 py-6 text-sm">还没有任何触发记录<br>去上面模拟检测试试</div>`;
  }

  box.innerHTML = html;
}

function clearEvents() {
  if (!confirm('清空所有战绩记录？')) return;
  state.events = [];
  localStorage.setItem('events', '[]');
  renderStats();
}

// ============== 好友 / 游戏中心 ==============
function myStreak() {
  const todayStart = new Date().setHours(0, 0, 0, 0);
  const todayCount = (state.events || []).filter(e => e.ts >= todayStart).length;
  let streak = 0;
  for (let i = 1; i <= 365; i++) {
    const dayStart = todayStart - i * 86400000;
    const dayEnd = dayStart + 86400000;
    if ((state.events || []).some(e => e.ts >= dayStart && e.ts < dayEnd)) break;
    streak++;
  }
  if (todayCount === 0) streak++;
  return { streak, todayCount };
}

const GAME_TYPES = {
  pool:     { icon: '💰', name: '奖池对赌',   desc: '每人押一笔钱，到期触发次数最少者通吃',
              defaults: () => ({ stake: 10, days: 7 }) },
  checkin:  { icon: '📅', name: '打卡接力',   desc: '每天每人都要打卡，断一人全队清零',
              defaults: () => ({ days: 30 }) },
  contract: { icon: '📜', name: '自律契约',   desc: '公开承诺一个目标，违约自动触发约定代价',
              defaults: () => ({ days: 30, penalty: '给见证人转 100 元' }) },
  duel:     { icon: '⚔️', name: 'PK 对战',    desc: 'N 天内触发次数最少的人赢',
              defaults: () => ({ days: 7 }) },
  ruleset:  { icon: '🧷', name: '互设规矩',   desc: '别人给你写一条规则，N 天内不可删',
              defaults: () => ({ days: 7, rule: '晚上 11 点后不许刷手机' }) },
};

function renderFriends() {
  const box = document.getElementById('friends-content');
  if (!box) return;
  const myName = state.myName || '我';
  const { streak, todayCount } = myStreak();

  let html = '';

  // ===== 身份卡 =====
  html += `
    <div class="bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl p-4 text-white mb-4">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs opacity-80">${escapeHtml(myName)} · ${state.myId}</div>
          <div class="text-2xl font-bold mt-1">🔥 ${streak} 天自律</div>
          <div class="text-xs opacity-90 mt-1">今日触发 ${todayCount} 次 · 免罚卡 ${state.mercyCards} 张</div>
        </div>
        <div class="text-5xl">${streak >= 7 ? '🏆' : streak >= 3 ? '⭐' : '💪'}</div>
      </div>
      <div class="flex gap-2 mt-3">
        <button onclick="editMyName()" class="flex-1 bg-white/20 backdrop-blur py-2 rounded-lg text-sm">✏️ 改名</button>
        <button onclick="shareMyStats()" class="flex-1 bg-white/20 backdrop-blur py-2 rounded-lg text-sm">📤 战报</button>
      </div>
    </div>
  `;

  // ===== 创建 / 加入 =====
  html += `
    <div class="grid grid-cols-2 gap-2 mb-4">
      <button onclick="openCreateGame()" class="bg-orange-500 text-white py-3 rounded-xl text-sm font-semibold">➕ 创建游戏</button>
      <button onclick="openJoinGame()" class="bg-gray-800 text-white py-3 rounded-xl text-sm font-semibold">🔗 加入邀请</button>
    </div>
  `;

  // ===== 我的游戏 =====
  const games = state.games || [];
  if (games.length === 0) {
    html += `
      <div class="bg-white border-2 border-dashed rounded-2xl p-8 text-center text-gray-400 text-sm">
        还没有游戏<br>创建一个或加入好友的邀请
      </div>
    `;
  } else {
    html += `<div class="text-xs text-gray-500 mb-2 px-1">我的游戏（${games.length}）</div>`;
    games.forEach(g => { html += renderGameCard(g); });
  }

  box.innerHTML = html;
}

function renderGameCard(g) {
  const t = GAME_TYPES[g.type] || { icon: '❓', name: g.type };
  const now = Date.now();
  const memberCount = (g.members || []).length;
  let body = '';
  let footer = '';

  if (g.type === 'pool') {
    const total = (g.members || []).reduce((s, m) => s + (m.stake || 0), 0);
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    body = `
      <div class="flex items-center justify-between mt-2">
        <div>
          <div class="text-2xl font-bold text-orange-600">¥${total}</div>
          <div class="text-xs text-gray-500">${memberCount} 人参与</div>
        </div>
        <div class="text-right text-xs text-gray-500">
          剩 ${daysLeft} 天<br>每人押 ¥${g.config.stake}
        </div>
      </div>
      <div class="mt-2 space-y-1">
        ${(g.members || []).map(m => `<div class="text-xs flex justify-between bg-gray-50 rounded p-1">
          <span>${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
          <span class="text-red-500">违规 ${m.violations || 0}</span>
        </div>`).join('')}
      </div>
    `;
    footer = `
      <button onclick="settleGame('${g.id}')" class="flex-1 bg-red-500 text-white py-1.5 rounded text-xs">结算</button>
    `;
  }

  if (g.type === 'checkin') {
    const todayKey = new Date().toISOString().slice(0, 10);
    const me = (g.members || []).find(m => m.id === state.myId);
    const checkedToday = me && me.lastDay === todayKey;
    body = `
      <div class="text-3xl font-bold text-orange-600 mt-2">第 ${g.chain || 0} 天</div>
      <div class="text-xs text-gray-500">${memberCount} 人接力中 · 目标 ${g.config.days} 天</div>
      <div class="mt-2 space-y-1">
        ${(g.members || []).map(m => {
          const ok = m.lastDay === todayKey;
          return `<div class="text-xs flex justify-between bg-gray-50 rounded p-1">
            <span>${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
            <span class="${ok ? 'text-green-600' : 'text-gray-400'}">${ok ? '✅ 今日已打' : '⏳ 待打卡'}</span>
          </div>`;
        }).join('')}
      </div>
    `;
    footer = checkedToday
      ? `<div class="flex-1 text-center text-green-600 text-xs py-1.5">✅ 今日已打卡</div>`
      : `<button onclick="checkinGame('${g.id}')" class="flex-1 bg-orange-500 text-white py-1.5 rounded text-xs">打卡</button>`;
  }

  if (g.type === 'contract') {
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const witnessName = (g.members || []).filter(m => m.id !== g.createdBy).map(m => escapeHtml(m.name)).join(', ') || '（待邀请）';
    const iAmCreator = state.myId === g.createdBy;
    const iAmWitness = !iAmCreator && (g.members || []).some(m => m.id === state.myId);
    const handed = g.handedOver;
    body = `
      <div class="bg-gray-900 text-white rounded-lg p-3 mt-2">
        <div class="text-sm font-bold">${escapeHtml(g.config.text || '未填写')}</div>
        <div class="text-xs opacity-70 mt-1">立约人：${escapeHtml(g.createdByName || '未知')}</div>
        <div class="text-xs opacity-70">见证人：${witnessName}</div>
        <div class="text-xs opacity-70">约定代价：${escapeHtml(g.config.penalty)}</div>
        <div class="text-xs opacity-70 mt-1">还剩 ${daysLeft} 天</div>
        ${handed ? `<div class="mt-2 bg-red-600 text-white text-xs p-2 rounded">⚠️ 已违约，控制权已移交给见证人</div>` : ''}
      </div>
    `;
    if (handed) {
      // 控制权在见证人手里
      if (iAmWitness) {
        footer = `
          <button onclick="executeContract('${g.id}')" class="flex-1 bg-red-500 text-white py-1.5 rounded text-xs">⚡ 执行惩罚</button>
          <button onclick="forgiveContract('${g.id}')" class="flex-1 bg-gray-200 py-1.5 rounded text-xs">😇 饶 TA</button>
        `;
      } else {
        footer = `<div class="flex-1 text-center text-xs text-gray-500 py-1.5">等待 ${witnessName} 裁决…</div>`;
      }
    } else {
      // 还在进行中
      if (iAmCreator) {
        footer = `
          <button onclick="breakGame('${g.id}')" class="flex-1 bg-gray-200 py-1.5 rounded text-xs">承认违约</button>
          <button onclick="completeGame('${g.id}')" class="flex-1 bg-green-500 text-white py-1.5 rounded text-xs">达成</button>
        `;
      } else if (iAmWitness) {
        footer = `<button onclick="reportBreak('${g.id}')" class="flex-1 bg-orange-500 text-white py-1.5 rounded text-xs">举报 TA 违约了</button>`;
      } else {
        footer = `<div class="flex-1 text-center text-xs text-gray-400 py-1.5">围观中</div>`;
      }
    }
  }

  if (g.type === 'duel') {
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const sorted = [...(g.members || [])].sort((a, b) => (a.violations || 0) - (b.violations || 0));
    body = `
      <div class="text-xs text-gray-500 mt-2">还剩 ${daysLeft} 天 · ${memberCount} 人参战</div>
      <div class="mt-2 space-y-1">
        ${sorted.map((m, i) => `<div class="text-xs flex justify-between bg-gray-50 rounded p-1">
          <span>${i === 0 ? '👑 ' : ''}${escapeHtml(m.name)}${m.id === state.myId ? '（我）' : ''}</span>
          <span class="text-red-500">${m.violations || 0} 次</span>
        </div>`).join('')}
      </div>
    `;
    footer = `<button onclick="settleGame('${g.id}')" class="flex-1 bg-red-500 text-white py-1.5 rounded text-xs">结算</button>`;
  }

  if (g.type === 'ruleset') {
    const daysLeft = Math.max(0, Math.ceil((g.endTs - now) / 86400000));
    const accepted = g.accepted;
    body = `
      <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mt-2">
        <div class="text-xs text-gray-500">规则内容</div>
        <div class="text-sm font-semibold mt-1">📌 ${escapeHtml(g.config.rule)}</div>
        <div class="text-xs text-gray-500 mt-1">由 ${escapeHtml(g.createdByName || '搭子')} 设定 · 锁定 ${g.config.days} 天</div>
        ${accepted ? `<div class="text-xs text-green-600 mt-1">✅ 已采纳，剩 ${daysLeft} 天解锁</div>` : ''}
      </div>
    `;
    footer = accepted
      ? `<div class="flex-1 text-center text-xs text-gray-400 py-1.5">已生效</div>`
      : `<button onclick="acceptGame('${g.id}')" class="flex-1 bg-orange-500 text-white py-1.5 rounded text-xs">采纳到我的规则</button>`;
  }

  return `
    <div class="bg-white border rounded-2xl p-4 mb-3 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="text-2xl">${t.icon}</div>
          <div>
            <div class="font-bold text-sm">${escapeHtml(g.name)}</div>
            <div class="text-xs text-gray-400">${t.name}</div>
          </div>
        </div>
        <button onclick="shareGame('${g.id}')" class="text-xs bg-gray-100 px-2 py-1 rounded">🔗 邀请</button>
      </div>
      ${body}
      <div class="flex gap-2 mt-3">
        ${footer}
        <button onclick="deleteGame('${g.id}')" class="px-3 bg-gray-100 rounded text-xs text-gray-500">删</button>
      </div>
    </div>
  `;
}

function closeGameForm() {
  const el = document.getElementById('game-form');
  if (el) el.remove();
}

function submitGameForm(type) {
  const fields = FORM_FIELDS[type];
  const cfg = {};
  let name = '';
  for (const f of fields) {
    const el = document.querySelector(`#game-form [data-key="${f.key}"]`);
    let val = el.value.trim();
    if (f.required && !val) { el.focus(); el.classList.add('border-red-500'); return; }
    if (f.type === 'number') val = parseInt(val) || f.value || 0;
    if (f.key === 'name') name = val;
    else cfg[f.key] = val;
  }
  closeGameForm();
  finalizeGame(type, name, cfg);
}

function finalizeGame(type, name, cfg) {
  const t = GAME_TYPES[type];
  const now = Date.now();

  const game = {
    id: 'G' + Math.random().toString(36).slice(2, 9).toUpperCase(),
    type, name: name.trim(), config: cfg,
    createdAt: now, createdBy: state.myId, createdByName: state.myName || '我',
    endTs: now + (cfg.days || 7) * 86400000,
    members: [{ id: state.myId, name: state.myName || '我', joinedAt: now, stake: cfg.stake || 0, violations: 0, lastDay: '' }],
    chain: 0, accepted: type === 'ruleset' ? false : undefined,
  };
  state.games.push(game);
  saveGames();
  feedAdd(`创建了 ${t.icon} ${name}`);
  renderFriends();
  setTimeout(() => shareGame(game.id), 200);
}

function saveGames() { localStorage.setItem('games', JSON.stringify(state.games)); }
function feedAdd(text) {
  state.feed.unshift({ ts: Date.now(), actor: state.myName || '我', text });
  state.feed = state.feed.slice(0, 50);
  localStorage.setItem('feed', JSON.stringify(state.feed));
}

// ---- 邀请 / 加入 ----
function shareGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const payload = btoa(unescape(encodeURIComponent(JSON.stringify(g))));
  const text = `【AI 自律发带 · 游戏邀请】\n${GAME_TYPES[g.type].icon} ${g.name}\n${GAME_TYPES[g.type].name} · ${(g.members || []).length} 人已加入\n\n复制这段发给好友 → 在好友 Tab 点"加入邀请"粘贴：\n---\n${payload}`;
  if (navigator.share) {
    navigator.share({ text }).catch(() => navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板')));
  } else {
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板，发给好友'));
  }
}

function openJoinGame() {
  const text = prompt('粘贴好友发来的邀请文本');
  if (!text) return;
  const m = text.match(/([A-Za-z0-9+/=]{40,})/);
  if (!m) return alert('没找到邀请数据');
  try {
    const game = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    // 已有则合并 members
    const existing = state.games.find(x => x.id === game.id);
    if (existing) {
      // 合并对方的 members 进来
      (game.members || []).forEach(mm => {
        if (!existing.members.find(x => x.id === mm.id)) existing.members.push(mm);
      });
    } else {
      // 新加入：把自己加进 members
      if (!(game.members || []).find(m => m.id === state.myId)) {
        game.members.push({
          id: state.myId, name: state.myName || '我', joinedAt: Date.now(),
          stake: game.config.stake || 0, violations: 0, lastDay: ''
        });
      }
      state.games.push(game);
    }
    saveGames();
    feedAdd(`加入了 ${GAME_TYPES[game.type].icon} ${game.name}`);
    alert(`✅ 已加入：${game.name}`);
    renderFriends();
  } catch (e) {
    alert('数据损坏：' + e.message);
  }
}

// ---- 通用操作 ----
function deleteGame(id) {
  if (!confirm('退出/删除这个游戏？')) return;
  state.games = state.games.filter(g => g.id !== id);
  saveGames();
  renderFriends();
}

function settleGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const sorted = [...(g.members || [])].sort((a, b) => (a.violations || 0) - (b.violations || 0));
  const winner = sorted[0];
  if (g.type === 'pool') {
    const total = (g.members || []).reduce((s, m) => s + (m.stake || 0), 0);
    alert(`🏆 ${winner.name} 赢得 ¥${total}`);
    feedAdd(`奖池"${g.name}"结算：${winner.name} 赢 ¥${total}`);
  } else {
    alert(`🏆 PK 胜者：${winner.name}（${winner.violations || 0} 次违规）`);
    feedAdd(`PK"${g.name}"结束：${winner.name} 胜出`);
  }
  state.games = state.games.filter(x => x.id !== id);
  saveGames();
  renderFriends();
}

function checkinGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const todayKey = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const me = g.members.find(m => m.id === state.myId);
  if (me.lastDay === todayKey) return;
  if (me.lastDay === yesterday || !me.lastDay) {
    g.chain = (g.chain || 0) + 1;
  } else {
    g.chain = 1;
  }
  me.lastDay = todayKey;
  saveGames();
  feedAdd(`在"${g.name}"打卡第 ${g.chain} 天`);
  renderFriends();
}

function breakGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const witness = (g.members || []).find(m => m.id !== g.createdBy);
  if (!witness) return alert('还没有见证人加入，先邀请一个');
  if (!confirm(`承认违约？控制权将移交给见证人 ${witness.name}，由 TA 决定是否执行：\n${g.config.penalty}`)) return;
  g.handedOver = true;
  g.handedAt = Date.now();
  saveGames();
  feedAdd(`承认违约"${g.name}"，控制权已交给 ${witness.name}`);
  alert(`✅ 控制权已移交给 ${witness.name}`);
  renderFriends();
}

function reportBreak(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`举报立约人违约？控制权将转到你手中，由你决定是否执行约定代价。`)) return;
  g.handedOver = true;
  g.handedAt = Date.now();
  saveGames();
  feedAdd(`举报"${g.createdByName}"违约了"${g.name}"`);
  renderFriends();
}

function executeContract(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`确认执行惩罚：${g.config.penalty}`)) return;
  feedAdd(`对"${g.createdByName}"执行了契约惩罚：${g.config.penalty}`);
  alert(`⚡ 通知 ${g.createdByName}：${g.config.penalty}`);
  state.games = state.games.filter(x => x.id !== id);
  saveGames();
  renderFriends();
}

function forgiveContract(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  state.mercyCards++;
  localStorage.setItem('mercyCards', state.mercyCards);
  feedAdd(`饶了"${g.createdByName}"一次（+1 免罚卡）`);
  state.games = state.games.filter(x => x.id !== id);
  saveGames();
  renderFriends();
}

function completeGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  feedAdd(`✅ 完成承诺"${g.name}"`);
  alert('🎉 恭喜你达成承诺！');
  state.games = state.games.filter(x => x.id !== id);
  saveGames();
  renderFriends();
}

function acceptGame(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  state.rules.push({
    id: Date.now() + Math.random(),
    name: g.name,
    condition: g.config.rule,
    type: 'instant',
    time_scope: 'always',
    time_desc: `全天（${g.createdByName} 设的，${g.config.days} 天内不可删）`,
    punishments: ['vibrate', 'bark'],
    enabled: true,
    locked_until: Date.now() + g.config.days * 86400000,
  });
  saveRules();
  g.accepted = true;
  saveGames();
  feedAdd(`采纳了 ${g.createdByName} 设的规矩：${g.name}`);
  alert('✅ 已加到规则 Tab');
  renderFriends();
}

// ============== Claude API 调用 ==============
async function callClaude(messages, system = null) {
  if (!state.apiKey) {
    alert('请先在右上角 ⚙️ 设置中填入 Anthropic API Key');
    throw new Error('no api key');
  }
  const body = {
    model: 'claude-opus-4-5',
    max_tokens: 1024,
    messages,
  };
  if (system) body.system = system;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const data = await res.json();
  return data.content[0].text;
}

const PLAN_SYSTEM = `你是一个严厉、直接、有洞察力的自律教练。用户会给你一个模糊的目标，你的工作不是立刻给方案，而是**反向提问**把目标逼清楚，最后产出可执行清单。

严格遵守以下流程：

【阶段 1：提问】
- 用户第一次说目标时，你先**问 2-4 个关键问题**，一次不要超过 4 个。
- 问题要尖锐、具体。**时间是必问项**，每条规则都必须有明确的时间范围。
- 时间问题必须问清楚：全天都算违规？还是只在某个时段（比如 22:00 之后不能喝酒）？还是只在工作日 / 周末？每天要做的事有没有截止时间（几点之前必须完成）？
- 其他可问：可量化吗？为什么做不到？触发场景？以前失败在哪？
- 语气像一个不废话的私教，不要客套不要鼓励。
- 问完问题后结尾加一行：（回答后我会继续追问或直接出方案）

【阶段 2：追问或收敛】
- 用户回答后，如果还不够清楚，再问 1-2 个关键问题。
- 最多追问 2 轮，然后必须进入阶段 3。

【阶段 3：出方案】
- 当你觉得信息足够时，**必须输出一段简短总结 + 一个严格 JSON 代码块**。
- 总结用人话写：你打算怎么拆、为什么这样拆。
- JSON 必须包在三个反引号 json 代码块里，结构如下：

{
  "summary": "一句话总结这个计划",
  "todos": [
    {"name": "要做的事名称", "detail": "具体怎么做", "time_scope": "daily_before_22:00", "time_desc": "每天 22 点前完成"}
  ],
  "donts": [
    {
      "name": "不能做的事名称",
      "condition": "摄像头第一视角如何判断我正在做这件事（供 VLM 判断的具体画面描述）",
      "time_scope": "always",
      "time_desc": "全天任何时候",
      "suggested_punishments": ["vibrate","bark","wecom"]
    }
  ]
}

规则：
- todos = 用户**应该做**的正向任务（行动清单，不触发惩罚）
- donts = 用户**不能做**的事，摄像头看到会触发惩罚
- **time_scope 和 time_desc 是每条规则的必填字段**，不能省略
- time_scope 必须从下面这些值里选（供程序判断）：
  - "always" — 全天任何时候
  - "hours:HH:MM-HH:MM" — 每天某时段，例如 "hours:22:00-06:00"（跨天也支持）
  - "weekdays:HH:MM-HH:MM" — 仅工作日某时段
  - "weekends:HH:MM-HH:MM" — 仅周末某时段
  - "daily_before_HH:MM" — 每天截止时间前（用于 todos）
  - "daily_after_HH:MM" — 每天某时间之后
- time_desc 是给用户看的中文说明，必须和 time_scope 对应
- suggested_punishments 从这些 ID 里挑：vibrate, buzzer, led, bark, email, wecom, sms, social, deduct, donate, lock, release
- donts 的 condition 必须是"摄像头能看见的具体画面描述"，不能抽象。❌"我在偷懒" ✅"画面中出现短视频 App 界面或我正躺在床上刷手机"
- todos 和 donts 至少各 1 条
- **如果用户没说清楚时间，必须在阶段 1 或 2 追问，不能自己乱填**
- 阶段 1/2 绝对不要输出 JSON，只在阶段 3 输出`;

// 判断当前时间是否落在规则的 time_scope 内
function isRuleActiveNow(rule) {
  const scope = rule.time_scope || 'always';
  if (scope === 'always') return true;
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const dow = now.getDay(); // 0=Sun ... 6=Sat
  const isWeekend = dow === 0 || dow === 6;

  const parseHM = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };
  const inRange = (start, end) => {
    if (start <= end) return hm >= start && hm <= end;
    return hm >= start || hm <= end; // 跨天
  };

  let m;
  if ((m = scope.match(/^hours:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^weekdays:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return !isWeekend && inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^weekends:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    return isWeekend && inRange(parseHM(m[1]), parseHM(m[2]));
  }
  if ((m = scope.match(/^daily_before_(\d{1,2}:\d{2})$/))) {
    return hm <= parseHM(m[1]);
  }
  if ((m = scope.match(/^daily_after_(\d{1,2}:\d{2})$/))) {
    return hm >= parseHM(m[1]);
  }
  return true;
}

function onTimePresetChange() {
  const v = document.getElementById('rule-time-preset').value;
  const rangeBox = document.getElementById('time-range-box');
  const singleBox = document.getElementById('time-single-box');
  rangeBox.classList.add('hidden'); rangeBox.classList.remove('flex');
  singleBox.classList.add('hidden');
  if (['hours','weekdays','weekends'].includes(v)) {
    rangeBox.classList.remove('hidden'); rangeBox.classList.add('flex');
  } else if (['daily_before','daily_after'].includes(v)) {
    singleBox.classList.remove('hidden');
  }
}

function loadTimeScopeToForm(scope) {
  let m;
  if (scope === 'always' || !scope) {
    document.getElementById('rule-time-preset').value = 'always';
  } else if ((m = scope.match(/^hours:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'hours';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^weekdays:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'weekdays';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^weekends:(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'weekends';
    document.getElementById('rule-time-start').value = m[1];
    document.getElementById('rule-time-end').value = m[2];
  } else if ((m = scope.match(/^daily_before_(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'daily_before';
    document.getElementById('rule-time-single').value = m[1];
  } else if ((m = scope.match(/^daily_after_(\d{1,2}:\d{2})$/))) {
    document.getElementById('rule-time-preset').value = 'daily_after';
    document.getElementById('rule-time-single').value = m[1];
  }
  onTimePresetChange();
}

function buildTimeScopeFromForm() {
  const preset = document.getElementById('rule-time-preset').value;
  if (preset === 'always') return { scope: 'always', desc: '全天任何时候' };
  const s = document.getElementById('rule-time-start').value;
  const e = document.getElementById('rule-time-end').value;
  const single = document.getElementById('rule-time-single').value;
  switch (preset) {
    case 'hours':        return { scope: `hours:${s}-${e}`,        desc: `每天 ${s}-${e}` };
    case 'weekdays':     return { scope: `weekdays:${s}-${e}`,     desc: `工作日 ${s}-${e}` };
    case 'weekends':     return { scope: `weekends:${s}-${e}`,     desc: `周末 ${s}-${e}` };
    case 'daily_before': return { scope: `daily_before_${single}`, desc: `每天 ${single} 之前` };
    case 'daily_after':  return { scope: `daily_after_${single}`,  desc: `每天 ${single} 之后` };
  }
  return { scope: 'always', desc: '全天' };
}

function saveRule() {
  const name = document.getElementById('rule-name').value.trim();
  const cond = document.getElementById('rule-condition').value.trim();
  const type = document.getElementById('rule-type').value;
  const punishments = [...document.querySelectorAll('.punish-cb:checked')].map(i=>i.dataset.pid);
  if (!name || !cond) return alert('名称和条件不能为空');
  if (punishments.length === 0) return alert('至少选一种惩罚');
  const time = buildTimeScopeFromForm();
  const rule = { id: Date.now(), name, condition: cond, type, time_scope: time.scope, time_desc: time.desc, punishments, enabled: true };
  if (state.editingRule !== null) {
    rule.id = state.rules[state.editingRule].id;
    state.rules[state.editingRule] = rule;
  } else {
    state.rules.push(rule);
  }
  saveRules();
  closeRuleModal();
  renderRules();
}

function startFrameStream() {

  const img = document.getElementById('board-frame');

  tick();
  frameTimer = setInterval(tick, 1000);
}
function stopFrameStream() {
  if (frameTimer) { clearInterval(frameTimer); frameTimer = null; }
}

function toggleMonitor() {
  if (monitorTimer) {
    clearInterval(monitorTimer);
    monitorTimer = null;
    document.getElementById('monitor-toggle').textContent = '▶️ 开始监控';
    return;
  }
  if (!state.boardUrl) return alert('先在 ⚙️ 设置里填板子地址');

async function pollSceneOnce() {
  if (!state.boardUrl) return alert('先填板子地址');
  const sceneEl = document.getElementById('current-scene');
  sceneEl.textContent = '🔍 正在读取画面...';
  try {
    const r = await fetch(state.boardUrl + '/scene', { cache: 'no-store' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    sceneEl.textContent = data.scene;
    await runDetection({ text: data.scene });
  } catch (e) {
    sceneEl.innerHTML = `<span class="text-red-500">❌ ${e.message}</span>`;
  }
}

async function runDetection(input) {
  const enabledRules = state.rules.filter(r => r.enabled && isRuleActiveNow(r));
  if (enabledRules.length === 0) return;
  const log = document.getElementById('monitor-log');
  const entry = document.createElement('div');
  entry.className = 'border rounded-lg p-3 bg-white text-sm';
  entry.innerHTML = `<div class="text-gray-400 text-xs">${new Date().toLocaleTimeString()}</div><div>🔍 匹配规则中...</div>`;
  log.prepend(entry);
  while (log.children.length > 10) log.lastChild.remove();

  const sys = `你是行为审查助手。判断输入场景描述是否触发以下任一规则。返回严格 JSON: {"matched": ["规则ID", ...], "reason": "简短说明"}。只返回 JSON。
规则列表：
${enabledRules.map(r => `- ID="${r.id}" 名称="${r.name}" 条件="${r.condition}"`).join('\n')}`;

  try {
    const messages = [{ role: 'user', content: '场景描述：' + input.text }];
    const reply = await callClaude(messages, sys);
    const json = JSON.parse(reply.match(/\{[\s\S]*\}/)[0]);
    const matched = (json.matched || []).map(id => enabledRules.find(r => String(r.id) === String(id))).filter(Boolean);
    if (matched.length === 0) {
      entry.innerHTML = `<div class="text-gray-400 text-xs">${new Date().toLocaleTimeString()}</div><div class="text-green-600">✅ 未触发任何规则</div><div class="text-xs text-gray-500 mt-1">${escapeHtml(json.reason||'')}</div>`;
    } else {
      const punishHtml = matched.map(r => {
        const ps = (r.punishments||[]).map(pid => {
          const p = PUNISHMENTS.find(x=>x.id===pid);
          return p ? `<span class="inline-block bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-xs mr-1">${p.icon}${p.name}</span>` : '';
        }).join('');
        return `<div class="mt-2"><b>⚠️ ${escapeHtml(r.name)}</b><div class="mt-1">${ps}</div></div>`;
      }).join('');
      entry.innerHTML = `<div class="text-gray-400 text-xs">${new Date().toLocaleTimeString()}</div><div class="text-red-600 font-semibold">🚨 触发 ${matched.length} 条规则</div><div class="text-xs text-gray-500 mt-1">${escapeHtml(json.reason||'')}</div>${punishHtml}`;
      if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
      // 写入战绩事件
      matched.forEach(r => {
        const ev = {
          ts: Date.now(),
          rule_id: r.id,
          rule_name: r.name,
          reason: json.reason || '',
          punishments: r.punishments || [],
        };
        state.events.push(ev);
        // Feed（自己的 timeline）
        state.feed.unshift({ ts: ev.ts, actor: state.myName || '我', type: 'trigger', text: `触发了"${r.name}"` });
        // 给所有正在进行的游戏的"我"加违规计数
        (state.games || []).forEach(g => {
          const me = (g.members || []).find(m => m.id === state.myId);
          if (me) me.violations = (me.violations || 0) + 1;
        });
      });
      if (state.events.length > 500) state.events = state.events.slice(-500);
      if (state.feed.length > 200) state.feed = state.feed.slice(0, 200);
      localStorage.setItem('events', JSON.stringify(state.events));
      localStorage.setItem('feed', JSON.stringify(state.feed));
      localStorage.setItem('games', JSON.stringify(state.games));
      renderStats();
    }
  } catch (e) {
    entry.innerHTML = `<div class="text-red-500">❌ ${e.message}</div>`;
  }
}

// ============== 工具 ==============
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============== 启动 ==============
if (state.apiKey) document.getElementById('header-sub').textContent = '✅ API 已连接';
renderChat();
switchTab('plan');

// 注册 Service Worker（PWA）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
